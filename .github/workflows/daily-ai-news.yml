name: Daily AI News

on:
  schedule:
    - cron: "35 6 * * *"
    - cron: "40 6 * * *"
    - cron: "50 6 * * *"
    - cron: "0 7 * * *"
    - cron: "10 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Push PushPlus digest
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
          REPORT_BASE_URL: ${{ vars.REPORT_BASE_URL }}
          MAX_NEWS_ITEMS: "8"
          LOCAL_TIMEZONE_HOURS: "8"
          FORCE_PUSH: ${{ github.event_name }}
        run: python ai_news_push.py

      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "Update daily AI news report"
          git push
